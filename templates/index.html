<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        h1 { color: #4a5568; margin-bottom: 10px; font-size: 24px; }
        p { color: #718096; margin-bottom: 25px; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .footer-credit {
            margin-top: 25px;
            font-size: 13px;
            color: #a0aec0;
            border-top: 1px solid #edf2f7;
            padding-top: 15px;
        }
        .brand-name { color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>Download videos from FB, TikTok, YT & more</p>
        
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste video link here..." required>
            <button type="submit">Download Now</button>
        </form>

        <div class="footer-credit">
            Developed by <span class="brand-name">M3NT4L</span>
        </div>
    </div>

</body>
</html>
